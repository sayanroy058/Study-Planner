{% extends "base.html" %}
{% block title %}Study Planner — StudyForge AI{% endblock %}

{% block content %}
<div class="feature-page">
    <header class="page-header reveal">
        <div>
            <a href="{{ url_for('dashboard') }}" class="back-link">← Dashboard</a>
            <h1>📅 Study Planner</h1>
            <p class="page-lead">Create a personalized schedule with milestones and fallback options.</p>
        </div>
    </header>

    <div class="feature-layout">
        <div class="feature-form-panel reveal" style="--delay:0.05s">
            <form id="plan-form" class="form-grid">
                <label>
                    Goal
                    <input type="text" name="goal" placeholder="e.g. Crack Data Structures in 8 weeks" required />
                </label>
                <label>
                    Current Level
                    <select name="currentLevel">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate" selected>Intermediate</option>
                        <option value="advanced">Advanced</option>
                    </select>
                </label>
                <label>
                    Hours Per Day
                    <input type="number" name="hoursPerDay" min="1" max="16" value="3" required />
                </label>
                <label>
                    Days Per Week
                    <input type="number" name="daysPerWeek" min="1" max="7" value="6" required />
                </label>
                <label>
                    Target Date
                    <input type="date" name="targetDate" />
                </label>
                <label class="full-width">
                    Focus Areas
                    <input type="text" name="focusAreas" placeholder="Arrays, Trees, Dynamic Programming" />
                </label>
                <label class="full-width">
                    Extra Notes
                    <textarea name="notes" rows="3" placeholder="Any constraints, exam pattern, or preferred learning style"></textarea>
                </label>
                <button type="submit" class="btn-primary full-width">Generate Plan ✨</button>
            </form>
        </div>

        <div class="feature-result-panel reveal" style="--delay:0.1s">
            <div class="result-toolbar">
                <span class="result-label">Your Study Plan</span>
                <button type="button" class="btn-icon-sm" data-download-target="plan-output" data-download-name="study-plan.md" title="Download">⬇ Download</button>
            </div>
            <div id="plan-output" class="result-box">
                <p class="placeholder">Your AI-generated study plan appears here.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
