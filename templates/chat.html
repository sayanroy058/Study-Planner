{% extends "base.html" %}
{% block title %}Ask AI — StudyForge AI{% endblock %}

{% block content %}
<div class="feature-page">
    <header class="page-header reveal">
        <div>
            <a href="{{ url_for('dashboard') }}" class="back-link">← Dashboard</a>
            <h1>💬 Ask AI</h1>
            <p class="page-lead">Get instant, teacher-style answers with examples and practice tasks.</p>
        </div>
    </header>

    <div class="feature-layout">
        <div class="feature-form-panel reveal" style="--delay:0.05s">
            <form id="chat-form" class="form-grid">
                <label class="full-width">
                    Your Question
                    <textarea name="question" rows="4" placeholder="e.g. Explain the difference between process and thread." required></textarea>
                </label>
                <label class="full-width">
                    Optional Context
                    <input type="text" name="context" placeholder="e.g. I am preparing for university viva." />
                </label>
                <button type="submit" class="btn-primary full-width">Ask AI ✨</button>
            </form>
            <div class="chat-actions">
                <button type="button" id="download-chat" class="btn-secondary">⬇ Download Chat</button>
                <button type="button" id="clear-chat" class="btn-secondary danger">✕ Clear Chat</button>
            </div>
        </div>

        <div class="feature-result-panel reveal" style="--delay:0.1s">
            <div class="result-toolbar">
                <span class="result-label">Conversation</span>
            </div>
            <div id="chat-output" class="chat-box">
                <p class="placeholder">Your conversation will appear here.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
